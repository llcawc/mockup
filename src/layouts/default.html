<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="utf-8" />
  <title>Mockup • {{ title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="assets/images/favicon.png" type="image/png" />
  <meta property="og:image" content="assets/images/preview.jpg">
  <link rel="preload" as="style" href="assets/css/fonts.min.css" />
  <link rel="stylesheet" href="assets/css/fonts.min.css" media="print" onload="this.media='all'" />
  <link rel="stylesheet" href="assets/css/main.min.css" />
</head>

<body>
  {% if title !== '404' %}
  <div class="grid">
    <!-- header -->
    {% include "includes/header.html" %}
  {% endif %}
    <!-- main -->
    {% block main %}
    This is the default main content
    {% endblock %}
  {% if title !== '404' %}
    <!-- footer -->
    {% include "includes/footer.html" %}
  </div>
    {% include "includes/popshare.html" %}
    {% include "includes/pswshare.html" %}
    <!-- scripts -->
    <script src="assets/js/main.min.js"></script>
  {% endif %}
</body>
</html>
